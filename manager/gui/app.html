<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Mortal Kombat 11 Korean Patch Manager</title>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    @font-face {
      font-family: 'NanumSquare Neo';
      src: url('kor.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      transition: opacity .25s ease;
    }
    body.refreshing { opacity: 0; }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 120px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .hero-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
    }
    .hero-content {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end;
      justify-content: space-between;
      padding: 14px 18px;
    }
    .hero-left { display: flex; flex-direction: column; gap: 5px; }
    .status-badge { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0; background: var(--text-muted);
    }
    .status-dot.patched { background: var(--success); box-shadow: 0 0 7px var(--success); }
    .status-dot.broken  { background: var(--danger);  box-shadow: 0 0 7px var(--danger);  }
    .status-dot.warning { background: var(--warning); box-shadow: 0 0 7px var(--warning); }
    .status-dot.loading { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }

    .status-label  { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: .02em; }
    .status-reason { font-size: 11px; color: rgba(240,236,224,.65); line-height: 1.5; max-width: 340px; }
    .status-reason strong { color: var(--text); }
    .hint-path { font-family: 'Consolas', monospace; font-size: 10px; color: rgba(201,168,76,.7); }
    .hero-credit { font-size: 11px; color: rgba(240,236,224,.45); align-self: flex-end; }

    /* ── Info cards ── */
    .info-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 20px;
    }
    .info-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transition: border-color .2s;
      min-width: 0;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .card-action {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      display: inline-block;
      width: 38px; height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s, box-shadow .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .toggle input:disabled + .toggle-slider { opacity: .4; cursor: not-allowed; }
    .help-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      border: 1px solid var(--text-muted); color: var(--text-muted);
      font-size: 9px; font-weight: 700; cursor: default;
      margin-left: 4px; vertical-align: middle;
      position: relative; flex-shrink: 0;
    }
    .help-icon::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 4px; padding: 7px 10px;
      font-size: 11px; color: var(--text-muted);
      width: 210px; white-space: normal; line-height: 1.55;
      pointer-events: none; opacity: 0; transition: opacity .15s;
      z-index: 200; font-family: var(--font-ui); font-weight: 400;
    }
    .help-icon:hover::after { opacity: 1; }
    .help-icon--warn {
      border-color: var(--danger);
      color: var(--danger);
      animation: helpPulse 2s ease-in-out infinite;
    }
    .help-icon--warn::after {
      width: 240px;
      bottom: auto; top: calc(100% + 8px);
      border-color: var(--danger);
    }
    @keyframes helpPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204, 51, 51, .4); }
      50%      { box-shadow: 0 0 0 4px rgba(204, 51, 51, 0); }
    }
    .btn--warn {
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn--warn:hover {
      background: rgba(204, 51, 51, .1);
    }

    .info-card:hover { border-color: var(--gold-dim); }
    .info-card--clickable { cursor: pointer; }
    .info-card--clickable:hover .card-label { color: var(--gold-dim); }
    .card-open-hint {
      display: inline-flex; align-items: center;
      margin-left: 5px; opacity: 0;
      transition: opacity .15s;
      vertical-align: middle;
      color: var(--gold-dim);
    }
    .info-card--clickable:hover .card-open-hint { opacity: 1; }

    .card-label {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: .06em; flex-shrink: 0;
    }
    .card-value {
      font-size: 12px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; flex: 1; min-width: 0;
    }
    .card-value.ok     { color: var(--success); }
    .card-value.update { color: var(--gold); }
    .card-value.error  { color: var(--danger); }


    /* ── Buttons ── */
    .btn          { border-radius: 3px; flex-shrink: 0; }
    .btn:disabled { opacity: .4; }
    .btn-sm     { font-size: 12px; padding: 6px 14px; }
    .btn-launch { font-size: 12px; padding: 8px 20px; }

    /* ── Icon buttons ── */
    .icon-btn {
      position: relative;
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer; color: var(--text-muted); flex-shrink: 0;
      transition: border-color .2s, color .2s;
      -webkit-appearance: none; appearance: none;
    }
    .icon-btn svg { width: 14px; height: 14px; }
    .icon-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .icon-btn.destructive:hover { border-color: var(--danger); color: var(--danger); }
    .icon-btn.destructive.armed {
      border-color: var(--danger); color: var(--danger);
      animation: armed-pulse 1s ease-in-out infinite;
    }
    @keyframes armed-pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
    .icon-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 10px;
      font-size: 11px; color: var(--text-muted);
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .15s;
      z-index: 100; font-family: var(--font-ui);
    }
    .icon-btn:hover::after { opacity: 1; }

    /* ── Footer ── */
    .footer {
      height: 54px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .footer-left  { display: flex; gap: 8px; margin-right: auto; }
    .footer-right { display: flex; gap: 8px; }

    /* ── Update modal ── */
    .update-modal {
      position: fixed; inset: 0;
      background: rgba(10,10,10,.88);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .update-modal.visible { opacity: 1; pointer-events: all; }
    .update-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      width: 310px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .update-dialog-title {
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .update-dialog-status { font-size: 12px; color: var(--text-muted); }
    .update-bar-bg {
      height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .update-bar-fill {
      height: 100%; background: var(--gold);
      border-radius: 2px; width: 0%;
      transition: width .35s ease;
    }
    .update-pct { font-size: 11px; color: var(--gold); text-align: right; }

    /* ── Floating Toast ── */
    .toast {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 16px;
      font-size: 12px; color: var(--text);
      pointer-events: none; opacity: 0;
      transition: opacity .22s, transform .22s;
      z-index: 600;
      max-width: 380px;
      width: max-content;
      white-space: normal;
      word-break: keep-all;
      line-height: 1.55;
      text-align: center;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok    { color: var(--success); border-color: rgba(74,154,90,.4); }
    .toast.error { color: var(--danger);  border-color: rgba(204,51,51,.4); }
  </style>
  <script src="lucide.min.js"></script>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <img class="hero-img" src="banner.png" alt="" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-left">
        <div class="status-badge">
          <div class="status-dot loading" id="dot"></div>
          <span class="status-label" id="status-label">상태 확인 중...</span>
        </div>
        <p class="status-reason" id="status-reason"></p>
      </div>
      <span class="hero-credit">by KimHerV</span>
    </div>
  </div>

  <!-- Info cards -->
  <div class="info-section">

    <!-- Card 1: 백업 경로 (클릭 시 폴더 열기) -->
    <div class="info-card info-card--clickable" id="card-backup" onclick="openExplorer()">
      <div class="card-body">
        <span class="card-label">백업 경로<span class="card-open-hint"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><path d="M8 1h3v3"/><path d="M11 1L6 6"/></svg></span></span>
        <span class="card-value" id="backup-path">—</span>
      </div>
    </div>

    <!-- Card 2: 버전 -->
    <div class="info-card" id="card-version">
      <div class="card-body">
        <span class="card-label">설치된 버전</span>
        <span class="card-value" id="installed-ver">—</span>
      </div>
      <div class="card-action">
        <span class="help-icon help-icon--warn" id="version-help" data-tip="" style="display:none">!</span>
        <button class="btn btn-outline btn-sm" id="btn-update-install"
                onclick="startUpdate()" disabled>확인 중...</button>
      </div>
    </div>

    <!-- Card 3: CVD 플러그인 -->
    <div class="info-card">
      <div class="card-body">
        <span class="card-label">
          CVD 플러그인
          <span class="help-icon" data-tip="게임 파일 무결성 검사를 우회하는 플러그인입니다. 비활성화하면 한글 패치가 작동하지 않습니다. 켜기/끄기 변경 시 게임을 먼저 종료하세요. 관리자 권한으로 실행해야 합니다.">?</span>
        </span>
        <span class="card-value" id="cvd-value">확인 중...</span>
      </div>
      <div class="card-action">
        <label class="toggle">
          <input type="checkbox" id="cvd-toggle" onchange="toggleCvd()" disabled>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>

  <div style="flex:1"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <button class="icon-btn" data-tooltip="피드백 보내기" onclick="openFeedback()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h3l3 3 3-3h3a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
        </svg>
      </button>
      <button class="icon-btn destructive" id="btn-uninstall"
              data-tooltip="패치 언인스톨" onclick="onUninstallClick()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12"/>
          <path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
          <path d="M3 4l1 9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-9"/>
          <line x1="6" y1="7" x2="6" y2="11"/>
          <line x1="10" y1="7" x2="10" y2="11"/>
        </svg>
      </button>
    </div>
    <div class="footer-right">
      <button class="btn btn-gold btn-launch" id="btn-launch" onclick="launchGame()" disabled>게임 실행</button>
    </div>
  </div>

  <!-- Update progress modal -->
  <div class="update-modal" id="update-modal">
    <div class="update-dialog">
      <div class="update-dialog-title">업데이트 설치</div>
      <div class="update-dialog-status" id="update-status">준비 중...</div>
      <div class="update-bar-bg">
        <div class="update-bar-fill" id="update-bar"></div>
      </div>
      <div class="update-pct" id="update-pct">0%</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Dev mock (브라우저 직접 열기용, pywebview 없을 때만 활성) ──
    if (typeof window.pywebview === 'undefined') {
      window.pywebview = { api: {
        get_status: async () => ({ state: 'PATCHED', game_path: 'C:\\Games\\MK11', backup_dir: 'C:\\Games\\MK11\\_backup_korean_patch', installed_version: '1.0', installed_version_display: 'v1.0 (2026-05-04)' }),
        check_update: async () => ({ ok: true, update_available: false, asset_urls: [] }),
        apply_update: async (j) => { setTimeout(() => { onUpdateProgress(50, '다운로드 중...'); }, 300); setTimeout(() => onUpdateDone(true), 1200); },
        launch_game: async () => { alert('[DEV] 게임 실행'); return { ok: true }; },
        open_in_explorer: async (p) => { alert('[DEV] 탐색기: ' + p); },
        open_feedback_page: async () => { alert('[DEV] 피드백 페이지'); },
        do_uninstall: async () => { alert('[DEV] 언인스톨러 실행 후 창 닫힘'); },
        open_release_page: async (url) => { alert('[DEV] 릴리즈 페이지: ' + url); },
        get_cvd_status: async () => ({ state: 'enabled' }),
        set_cvd_enabled: async (enable) => { return { ok: true }; },
      }};
      document.addEventListener('DOMContentLoaded', () => setTimeout(() => window.dispatchEvent(new Event('pywebviewready')), 80));
    }

    let _backupDir       = '';
    let _gamePath        = '';
    let _updateInfo      = null;
    let _toastTimer      = null;
    let _uninstallArmed  = false;
    let _uninstallTimer  = null;
    let _cvdState        = 'unknown';
    let _patchState      = '';

    window.addEventListener('pywebviewready', async () => {
      await loadStatus();
      await loadCvdStatus();
      equalizeCards();
      loadLatestVersion();
    });

    /* ── Toast ── */
    function toast(text, cls) {
      const el = document.getElementById('toast');
      clearTimeout(_toastTimer);
      el.textContent = text;
      el.className   = 'toast' + (cls ? ' ' + cls : '') + ' visible';
      _toastTimer    = setTimeout(() => el.classList.remove('visible'), 3000);
    }

    /* ── Card height equalizer ── */
    function equalizeCards() {
      const cards = [...document.querySelectorAll('.info-card')];
      cards.forEach(c => c.style.minHeight = '');
      const max = Math.max(...cards.map(c => c.offsetHeight));
      cards.forEach(c => c.style.minHeight = max + 'px');
    }

    /* ── CVD ── */
    async function loadCvdStatus() {
      try {
        const c = await window.pywebview.api.get_cvd_status();
        _cvdState = c.state;
        updateCvdCard(c);
        updateStatusLabel();
      } catch (e) {}
    }

    function updateCvdCard(c) {
      const val      = document.getElementById('cvd-value');
      const checkbox = document.getElementById('cvd-toggle');
      if (c.state === 'enabled') {
        val.textContent = '활성화됨'; val.className = 'card-value ok';
        checkbox.checked = true;  checkbox.disabled = false;
      } else if (c.state === 'disabled') {
        val.textContent = '비활성화됨'; val.className = 'card-value error';
        checkbox.checked = false; checkbox.disabled = false;
      } else if (c.state === 'not_installed') {
        val.textContent = '미설치'; val.className = 'card-value';
        checkbox.checked = false; checkbox.disabled = true;
      } else if (c.state === 'partial') {
        val.textContent = `일부 활성 (${c.enabled}/${c.enabled + c.disabled})`;
        val.className = 'card-value update';
        checkbox.checked = c.enabled >= c.disabled; checkbox.disabled = false;
      }
    }

    function updateStatusLabel() {
      if (_patchState !== 'PATCHED') return;
      const label = document.getElementById('status-label');
      label.textContent = _cvdState === 'disabled'
        ? '한글 패치 적용 중 (플러그인 꺼짐)'
        : '한글 패치 적용 중';
    }

    async function toggleCvd() {
      const checkbox = document.getElementById('cvd-toggle');
      const enable   = checkbox.checked;
      checkbox.disabled = true;
      const r = await window.pywebview.api.set_cvd_enabled(enable);
      if (r.ok) {
        await loadCvdStatus();
        equalizeCards();
      } else {
        toast(r.error || '변경 실패', 'error');
        checkbox.checked  = !enable;
        checkbox.disabled = false;
      }
    }

    /* ── Status ── */
    async function loadStatus() {
      let s;
      try { s = await window.pywebview.api.get_status(); }
      catch (e) { document.getElementById('status-label').textContent = '오류'; return; }
      if (!s) return;

      _gamePath  = s.game_path  || '';
      _backupDir = s.backup_dir || '';

      document.getElementById('backup-path').textContent   = _backupDir || '—';
      document.getElementById('installed-ver').textContent = s.installed_version_display || s.installed_version || '—';
      document.getElementById('btn-launch').disabled       = !_gamePath;
      const cardBackup = document.getElementById('card-backup');
      cardBackup.classList.toggle('info-card--clickable', !!_backupDir);
      cardBackup.style.cursor = _backupDir ? 'pointer' : 'default';

      const dot    = document.getElementById('dot');
      const label  = document.getElementById('status-label');
      const reason = document.getElementById('status-reason');
      dot.className = 'status-dot';

      // 버전 카드 경고 표시 리셋 (상태 재진입 시 깨끗한 상태에서 시작)
      const versionHelpReset = document.getElementById('version-help');
      if (versionHelpReset) versionHelpReset.style.display = 'none';
      const updateBtnReset = document.getElementById('btn-update-install');
      if (updateBtnReset) updateBtnReset.classList.remove('btn--warn');

      if (s.state === 'PATCHED') {
        dot.classList.add('patched');
        reason.textContent = '';
        _patchState = 'PATCHED';
        updateStatusLabel();
      } else if (s.state === 'BROKEN') {
        dot.classList.add('broken');
        label.textContent  = '패치가 감지되지 않습니다';
        reason.textContent = s.reason || '';
      } else if (s.state === 'GAME_PATH_INVALID') {
        dot.classList.add('warning');
        label.textContent = '게임 경로를 확인할 수 없습니다';
        reason.innerHTML  =
          'MK11이 설치된 <strong>최상위 게임 폴더</strong>를 선택하세요.<br>' +
          '<span class="hint-path">Steam : steamapps/common/Mortal Kombat 11</span>';
      } else if (s.state === 'BACKUP_MISSING') {
        dot.classList.add('broken');
        label.textContent  = '패치 파일 없음';
        reason.textContent = '인스톨러를 다시 실행하여 패치를 적용하세요.';
      } else if (s.state === 'OVERWRITTEN') {
        dot.classList.add('broken');
        label.textContent  = '번역 파일이 변경됨';
        reason.textContent = '';
        _patchState = 'OVERWRITTEN';

        // 버전 카드: 경고 표시
        const helpIcon = document.getElementById('version-help');
        if (helpIcon) {
          helpIcon.setAttribute('data-tip', s.reason || '게임 폴더의 번역 파일이 변경되었습니다. 인스톨러를 다시 실행해 주세요.');
          helpIcon.style.display = '';
        }
        const updateBtn = document.getElementById('btn-update-install');
        if (updateBtn) {
          updateBtn.textContent = '재설치 필요';
          updateBtn.classList.add('btn--warn');
          updateBtn.disabled = true;
        }
      }

      equalizeCards();
    }

    /* ── Latest version ── */
    async function loadLatestVersion() {
      // OVERWRITTEN 상태에서는 "재설치 필요" 메시지 유지
      if (_patchState === 'OVERWRITTEN') return;

      const btn = document.getElementById('btn-update-install');
      btn.textContent = '확인 중...';
      btn.className   = 'btn btn-outline btn-sm';
      btn.disabled    = true;
      try {
        const u = await window.pywebview.api.check_update();
        if (_patchState === 'OVERWRITTEN') return;
        if (!u.ok) {
          btn.textContent = '확인 실패';
          return;
        }
        if (u.update_available) {
          _updateInfo = { version: u.latest_version, date: u.published_at, urls: u.asset_urls };
          btn.textContent = '업데이트 설치';
          btn.className   = 'btn btn-gold btn-sm';
          btn.disabled    = false;
        } else {
          btn.textContent = '최신 버전 적용 중';
          btn.className   = 'btn btn-outline btn-sm';
          btn.disabled    = true;
        }
      } catch (e) {
        btn.textContent = '확인 실패';
      }
    }

    /* ── Update flow ── */
    function startUpdate() {
      document.getElementById('update-modal').classList.add('visible');
      document.getElementById('update-status').textContent = '준비 중...';
      document.getElementById('update-bar').style.width    = '0%';
      document.getElementById('update-pct').textContent    = '0%';
      window.pywebview.api.apply_update(JSON.stringify(_updateInfo));
    }

    function onUpdateProgress(pct, msg) {
      document.getElementById('update-status').textContent = msg;
      document.getElementById('update-bar').style.width    = pct + '%';
      document.getElementById('update-pct').textContent    = pct + '%';
    }

    function onUpdateDone(ok, errMsg) {
      document.getElementById('update-modal').classList.remove('visible');
      if (ok) {
        toast('업데이트가 완료됐습니다.', 'ok');
        refreshAll();
      } else {
        const btn = document.getElementById('btn-update-install');
        btn.textContent = '업데이트 설치';
        btn.className   = 'btn btn-gold btn-sm';
        btn.disabled    = false;
        toast(errMsg || '업데이트 실패', 'error');
      }
    }

    /* ── Refresh ── */
    async function refreshAll() {
      document.body.classList.add('refreshing');
      await new Promise(r => setTimeout(r, 280));
      await Promise.all([loadStatus(), loadLatestVersion()]);
      await new Promise(r => setTimeout(r, 40));
      document.body.classList.remove('refreshing');
    }

    /* ── Game launch ── */
    async function launchGame() {
      const r = await window.pywebview.api.launch_game();
      if (!r.ok) toast(r.error || '실행 실패', 'error');
    }

    /* ── Explorer ── */
    function openExplorer() {
      if (_backupDir) window.pywebview.api.open_in_explorer(_backupDir);
    }

    /* ── Feedback ── */
    function openFeedback() {
      window.pywebview.api.open_feedback_page();
    }

    /* ── Uninstall ── */
    function onUninstallClick() {
      const btn = document.getElementById('btn-uninstall');
      if (!_uninstallArmed) {
        _uninstallArmed = true;
        btn.classList.add('armed');
        btn.setAttribute('data-tooltip', '한 번 더 클릭하여 확인');
        _uninstallTimer = setTimeout(() => {
          _uninstallArmed = false;
          btn.classList.remove('armed');
          btn.setAttribute('data-tooltip', '패치 언인스톨');
        }, 3000);
        return;
      }
      clearTimeout(_uninstallTimer);
      btn.classList.remove('armed');
      btn.setAttribute('data-tooltip', '패치 언인스톨');
      _uninstallArmed = false;
      window.pywebview.api.do_uninstall();
    }

    function onUninstallError(msg) {
      toast(msg || '언인스톨러를 찾을 수 없습니다.', 'error');
    }
  </script>
<script>lucide.createIcons();</script>
</body>
</html>
