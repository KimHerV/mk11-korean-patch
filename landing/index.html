<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortal Kombat 11 Korean Patch</title>
  <meta name="description" content="Unofficial Korean localization patch for Mortal Kombat 11" />
  <link rel="stylesheet" href="style.css" />
  <script src="content.js"></script>

<body>

  <!-- ── Language toggle ──────────────────────────────────────── -->
  <div class="lang-toggle" aria-label="Language selector">
    <button class="lang-btn active" data-lang="kr" onclick="setLocale('kr')">KR</button>
    <button class="lang-btn"        data-lang="en" onclick="setLocale('en')">EN</button>
  </div>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <header class="hero">
    <video class="hero-video" autoplay loop muted playsinline preload="auto">
      <source src="assets/hero.mp4" type="video/mp4" />
    </video>

    <div class="hero-inner">
      <p class="hero-eyebrow" data-i18n="hero.eyebrow"></p>
      <h1 class="hero-title"><span data-i18n="hero.title_en"></span><span class="hero-title-kr" data-i18n="hero.title_kr"></span></h1>
      <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
      <div class="hero-actions">
        <a href="#install" class="btn btn-primary">
          <span data-i18n="hero.btn_download"></span>
        </a>
        <a href="#feedback" class="btn btn-secondary" data-i18n="hero.btn_feedback"></a>
      </div>
      <p class="hero-legal" data-i18n="hero.legal"></p>
      <p class="hero-credit" data-i18n="hero.credit"></p>
    </div>
  </header>

    <div class="container stats-grid">
      <div class="stat-item">

      <div class="stat-item">
        <span class="stat-number" id="total-downloads">—</span>
        <span class="stat-label" data-i18n="stats.s4_label"></span>
      </div>
    </div>
  </section>

  <!-- ── SCREENSHOTS ──────────────────────────────────────── -->
  <section class="section carousel-section" id="screenshots">
    <div class="container">
      <h2 class="section-title" data-i18n="screenshots.heading"></h2>

        <div class="carousel-track" id="carousel-track">

          <figure class="carousel-slide" data-i18n-label="screenshots.slide1_label">
            <img src="assets/screenshot-charselect.jpg" alt="Character select screen in Korean" loading="lazy" />
          </figure>

          <figure class="carousel-slide" data-i18n-label="screenshots.slide2_label">
            <img src="assets/screenshot-story.jpg" alt="Story mode with Korean subtitles" loading="lazy" />
          </figure>

          <figure class="carousel-slide" data-i18n-label="screenshots.slide3_label">
            <img src="assets/screenshot-dialogue.jpg" alt="Battle dialogue in Korean" loading="lazy" />
          </figure>

          <figure class="carousel-slide" data-i18n-label="screenshots.slide4_label">
            <img src="assets/screenshot-movelist.jpg" alt="Movelist in Korean" loading="lazy" />

          <figure class="carousel-slide" data-i18n-label="screenshots.slide5_label">

  <!-- ── FEEDBACK ─────────────────────────────────────────── -->
  <section class="section section-dark" id="feedback">
    <div class="container container-narrow">
      <h2 class="section-title" data-i18n="feedback.heading"></h2>
      <p class="section-sub" data-i18n="feedback.sub"></p>

      <form id="feedback-form" class="feedback-form" novalidate>
        <div class="form-row">
          <label for="category" data-i18n="feedback.label_category"></label>
          <select id="category" name="category">

            <option value="" disabled selected data-i18n="feedback.opt_placeholder"></option>
            <option value="story"    data-i18n="feedback.opt_story"></option>
            <option value="ingame"   data-i18n="feedback.opt_ingame"></option>
            <option value="movelist" data-i18n="feedback.opt_movelist"></option>
            <option value="tutorial" data-i18n="feedback.opt_tutorial"></option>
            <option value="items"    data-i18n="feedback.opt_items"></option>
            <option value="ui"       data-i18n="feedback.opt_ui"></option>
            <option value="krypt"    data-i18n="feedback.opt_krypt"></option>
            <option value="other"    data-i18n="feedback.opt_other"></option>
          </select>
          <span class="field-error" id="error-category"></span>
        </div>

        <div class="form-row" id="subcategory-row" hidden>
          <label for="subcategory">
            <span data-i18n="feedback.label_subcategory"></span>
            <span class="label-hint" data-i18n="feedback.label_subcategory_hint"></span>
          </label>
          <select id="subcategory" name="subcategory">
            <option value="" disabled selected data-i18n="feedback.opt_sub_placeholder"></option>
          </select>
        </div>

        <div class="form-row" id="char-row" hidden>
          <label><span data-i18n="feedback.label_characters"></span> <span class="required">*</span></label>
          <div class="char-vs-row">
            <button type="button" id="char-btn-a" class="char-select-btn" aria-haspopup="dialog">
              <span id="char-btn-a-text" data-i18n="feedback.char_placeholder_a"></span>
            </button>
            <span class="char-vs-divider">VS</span>
            <button type="button" id="char-btn-b" class="char-select-btn" aria-haspopup="dialog" disabled>
              <span id="char-btn-b-text" data-i18n="feedback.char_placeholder_b"></span>
            </button>
          </div>
          <input type="hidden" id="character_a" name="character_a" />
          <input type="hidden" id="character_b" name="character_b" />
          <span class="field-error" id="error-chars"></span>
        </div>

        <div class="form-row">
          <label for="original">
            <span data-i18n="feedback.label_original"></span>
            <span class="label-hint" data-i18n="feedback.label_original_hint"></span>
          </label>
          <input type="text" id="original" name="original"
            data-i18n-placeholder="feedback.placeholder_original" />
        </div>

        <div class="form-row">
          <label for="suggestion">
            <span data-i18n="feedback.label_suggestion"></span>
            <span class="required">*</span>
          </label>
          <textarea id="suggestion" name="suggestion" rows="4"
            data-i18n-placeholder="feedback.placeholder_suggestion"></textarea>
          <span class="field-error" id="error-suggestion"></span>
        </div>
        <div class="form-row">
          <label for="nickname">
            <span data-i18n="feedback.label_nickname"></span>
            <span class="label-hint" data-i18n="feedback.label_nickname_hint"></span>
          </label>
          <input type="text" id="nickname" name="nickname"
            data-i18n-placeholder="feedback.placeholder_nickname"
            data-i18n-default="feedback.nickname_default"
            value="익명"
            maxlength="30" />
        </div>
        <div class="form-footer">
          <button type="submit" class="btn btn-primary" id="submit-btn" data-i18n="feedback.btn_submit"></button>
          <p class="form-notice" data-i18n="feedback.notice"></p>
        </div>
        <div id="form-result" class="form-result" hidden></div>
      </form>
    </div>
  </section>

  <!-- ── MUSIC PLAYER ──────────────────────────────────────── -->
  <div id="yt-iframe" style="position:fixed;bottom:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" aria-hidden="true"></div>

  <div id="music-player" class="music-player">

    <!-- Left: album art + track info -->
    <div class="mp-info">
      <img class="mp-thumb" src="assets/mk11_icon.png" alt="MK11" />
      <div class="mp-meta">
        <div class="mp-title-wrap">
          <span id="music-title-link" class="mp-title-link" role="button" tabindex="0" aria-label="View on YouTube">
            <span id="music-title" class="mp-title">Mortal Kombat 11 OST</span>
          </span>
        </div>
        <span class="mp-sub">Official Soundtrack · WB Games</span>
      </div>
    </div>

    <!-- Play button: direct grid child. Desktop=top center, mobile=right. -->
    <button id="music-play" class="mp-btn mp-btn--play" aria-label="Play">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    </button>

    <!-- Center: progress bar (desktop) / bottom bar (mobile) -->
    <div class="mp-center">
      <div class="mp-progress-row">
        <span id="music-time" class="mp-time">0:00</span>
        <div id="music-progress-bar" class="mp-progress-bar" role="slider" aria-label="Playback position">
          <div id="music-progress-fill" class="mp-progress-fill"></div>
        </div>
        <span id="music-duration" class="mp-time">0:00</span>
      </div>
    </div>

    <!-- Right: volume -->
    <div class="mp-right">

  <script>
  (function () {
    var collapse  = document.getElementById('about-collapse');
    var toggleBtn = document.getElementById('about-toggle');
    var moreSpan  = document.getElementById('about-toggle-more');
    var lessSpan  = document.getElementById('about-toggle-less');
    var icon      = document.getElementById('about-toggle-icon');

    toggleBtn.addEventListener('click', function () {
      var open = collapse.classList.toggle('about-collapse--open');
      moreSpan.hidden = open;
      lessSpan.hidden = !open;
      if (open) {
        icon.style.transform = 'rotate(180deg)';
      } else {
        icon.style.transform = '';
        collapse.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }());

  (function () {
    var modal    = document.getElementById('online-modal');
    var backdrop = document.getElementById('online-modal-backdrop');
    var closeBtn = document.getElementById('online-modal-close');
    var cancelBtn = document.getElementById('online-modal-cancel');
    var confirmBtn = document.getElementById('online-modal-confirm');
    var downloadBtn = document.getElementById('download-btn');
    var downloadUrl = '';

    function openModal(url) {
      downloadUrl = url;
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
      confirmBtn.focus();
    }

    function closeModal() {
      modal.hidden = true;
      document.body.style.overflow = '';
      if (downloadBtn) downloadBtn.focus();
    }

    if (downloadBtn) {
      downloadBtn.addEventListener('click', function (e) {
        e.preventDefault();
        openModal(this.href);
      });
    }

    confirmBtn.addEventListener('click', function () {
      window.open(downloadUrl, '_blank', 'noopener,noreferrer');
      closeModal();
    });

    [closeBtn, cancelBtn, backdrop].forEach(function (el) {
      el.addEventListener('click', closeModal);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !modal.hidden) closeModal();
    });
  }());
  </script>
</body>
